# Local 4-node A2A mesh — v0.6.3.1
#
# Spins up four ai-memory nodes with mTLS between them, plus an OpenClaw agent
# wired to each. This is the no-DigitalOcean reproduction harness; the DO version
# lives in harness/terraform/.
#
# Status: scaffolding. Image refs pinned to v0.6.3.1; service bodies pending.

version: "3.9"

x-ai-memory-base: &ai-memory-base
  image: ghcr.io/alphaonedev/ai-memory:0.6.3.1
  restart: unless-stopped
  environment:
    AI_MEMORY_TIER: autonomous
    AI_MEMORY_LOG_LEVEL: info

services:
  node-a:
    <<: *ai-memory-base
    container_name: a2a-node-a
    hostname: node-a
    networks: [mesh]
    # TODO — mount certs/, ai-memory.toml, expose 8080+8081

  node-b:
    <<: *ai-memory-base
    container_name: a2a-node-b
    hostname: node-b
    networks: [mesh]

  node-c:
    <<: *ai-memory-base
    container_name: a2a-node-c
    hostname: node-c
    networks: [mesh]

  node-d:
    <<: *ai-memory-base
    container_name: a2a-node-d
    hostname: node-d
    networks: [mesh]

  # TODO — openclaw / hermes / ironclaw agent containers, one per node

networks:
  mesh:
    driver: bridge
