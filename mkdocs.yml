site_name: ai-memory A2A v0.6.3.1 campaign
site_description: >-
  Per-release agent-to-agent (A2A) certification campaign for
  ai-memory-mcp v0.6.3.1 (tag cut 2026-04-30, schema v19). 4-node
  DigitalOcean mesh dispatched from this node covers IronClaw + Hermes;
  OpenClaw is in scope and runs separately via Docker mesh from a
  higher-resource node (16 GB+ per container — General Purpose tier
  or workstation). Governed by docs/governance.md.
site_url: https://alphaonedev.github.io/ai-memory-a2a-v0.6.3.1/
repo_url: https://github.com/alphaonedev/ai-memory-a2a-v0.6.3.1
repo_name: alphaonedev/ai-memory-a2a-v0.6.3.1
copyright: >-
  Copyright &copy; 2026 <a href="https://github.com/alphaonedev/alphaone-website" rel="noopener" style="color:inherit">AlphaOne LLC</a>. Apache-2.0.

theme:
  name: material
  logo: assets/a1-mark.svg
  favicon: assets/a1-mark.svg
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.instant
    - navigation.instant.progress
    - navigation.sections
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.share
    - search.suggest
    - toc.follow
    - content.code.copy
    - content.code.annotate
    - content.tooltips
  palette:
    # Default = slate (dark), matching alphaone-website's primary mode.
    - scheme: slate
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-sunny
        name: Switch to light mode
    - scheme: default
      primary: indigo
      accent: cyan
      toggle:
        icon: material/weather-night
        name: Switch to dark mode
  icon:
    repo: fontawesome/brands/github

extra_css:
  - stylesheets/alphaone.css

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/alphaonedev
      name: alphaonedev on GitHub
  generator: false   # drop the "Made with Material for MkDocs" line

nav:
  - Home: index.md
  - Testing corpus: testing-corpus.md
  - Governance:
      - First-Principles governance: governance.md
      - Prime Directive (safety): prime-directive.md
      - Scope (v0.6.3.1 specifics): scope.md
      - Verdict matrix: matrix.md
      - Findings funnel: findings.md
  - AI NHI:
      - What an NHI assessment is: nhi-assessments.md
      - Latest-run insights: nhi-insights.md
      - Per-run NHI matrix: nhi/index.md
      - OpenClaw v0.6.3.1 behavioral assessment: nhi/openclaw-behavioral-v0.6.3.1.md
      - Inherited gate insights: insights.md
  - Forensic Audit Trail:
      - What the audit trail proves: forensic-audit.md
      - Per-run forensics matrix: forensics/index.md
  - Campaign runs: runs/
  - Specification:
      - Baseline configuration: baseline.md
      - Test book: testbook.md
      - Capability domains: capabilities.md
      - Every test performed: tests.md
      - Architecture: architecture.md
      - Topology: topology.md
      - Methodology: methodology.md
      - ai-memory integration: ai-memory-integration.md
      - Infrastructure versions: infrastructure.md
      - v1.0 GA criteria: v1-ga-criteria.md
  - Scenarios:
      - Carry-forward S1–S8: scenarios.md
      - 1. Per-agent write + read: scenarios/1-write-read.md
      - 2. Shared-context handoff: scenarios/2-handoff.md
      - 3. Targeted share: scenarios/3-targeted-share.md
      - 4. Federation-aware agents: scenarios/4-federation.md
      - 5. Consolidation + curation: scenarios/5-consolidation.md
      - 6. Contradiction detection: scenarios/6-contradiction.md
      - 7. Scoping visibility: scenarios/7-scoping.md
      - 8. Auto-tagging: scenarios/8-auto-tagging.md
  - Agents:
      - IronClaw: agents/ironclaw.md
      - Hermes: agents/hermes.md
      - OpenClaw: agents/openclaw.md
  - Operations:
      - Runbook: runbook.md
      - Reproducing (DO): reproducing.md
      - Local Docker mesh: local-docker-mesh.md
      - Incidents: incidents.md
      - Security: security.md

plugins:
  - search
  - macros:
      module_name: main

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - footnotes
  - tables
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.tilde
  - pymdownx.tasklist:
      custom_checkbox: true
  - toc:
      permalink: true
      permalink_title: "Anchor link to this section"
